<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="빼기 마스터">
  <meta name="theme-color" content="#0a0a1a">
  <title>빼기 마스터</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-192.png">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; }
    html, body { height: 100%; width: 100%; overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: linear-gradient(135deg, #071a12 0%, #0d2818 50%, #071a12 100%); color: #fff; transition: background 0.5s ease; }

    /* 라운드별 배경색 */
    body.round-1 { background: linear-gradient(135deg, #071a12 0%, #0d2818 50%, #071a12 100%); }
    body.round-2 { background: linear-gradient(135deg, #091c14 0%, #0f2a1a 50%, #091c14 100%); }
    body.round-3 { background: linear-gradient(135deg, #0b1e16 0%, #112c1c 50%, #0b1e16 100%); }
    
    /* 목표 달성 축하 애니메이션 */
    .goal-celebration {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 9999;
    }
    .goal-celebration .celebration-text {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
      font-size: 42px; font-weight: 900; color: #93c5fd; text-shadow: 0 0 20px #93c5fd, 0 0 40px #3b82f6;
      animation: celebrateText 2.3s ease-out forwards; opacity: 0;
      text-align: center; width: 100%; display: flex; align-items: center; justify-content: center;
    }
    @keyframes celebrateText {
      0% { opacity: 0; transform: translate(-50%, -50%) scale(0.3); }
      30% { opacity: 1; transform: translate(-50%, -50%) scale(1.2); }
      50% { transform: translate(-50%, -50%) scale(1); }
      100% { opacity: 0; transform: translate(-50%, -50%) scale(1.5) translateY(-50px); }
    }
    .celebration-reward {
      font-size: 32px; margin-top: 15px; color: #fff;
      text-shadow: 0 0 15px #ff69b4, 0 0 30px #ffd700;
      animation: rewardPop 0.5s ease-out 0.3s both;
      text-align: center;
    }
    @keyframes rewardPop {
      0% { opacity: 0; transform: scale(0); }
      70% { transform: scale(1.2); }
      100% { opacity: 1; transform: scale(1); }
    }
    .confetti {
      position: absolute; width: 10px; height: 10px; opacity: 0;
      animation: confettiFall 3s ease-out forwards;
    }
    @keyframes confettiFall {
      0% { opacity: 1; transform: translateY(0) rotate(0deg); }
      100% { opacity: 0; transform: translateY(100vh) rotate(720deg); }
    }
    .firework {
      position: absolute; width: 6px; height: 6px; border-radius: 50%;
      animation: fireworkBurst 1s ease-out forwards;
    }
    @keyframes fireworkBurst {
      0% { opacity: 1; transform: scale(0); }
      50% { opacity: 1; transform: scale(1); }
      100% { opacity: 0; transform: scale(2); }
    }
    .container { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; padding-top: env(safe-area-inset-top); padding-bottom: env(safe-area-inset-bottom); }
    .hidden { display: none !important; }
    button { font-family: inherit; cursor: pointer; border: none; }
    input { font-family: inherit; }
    
    /* 언어 선택 */
    .lang-selector {
      display: flex;
      gap: 4px;
      flex-wrap: wrap;
      justify-content: center;
      max-width: 340px;
      margin: 0 auto 15px auto;
    }
    .lang-btn {
      padding: 6px 10px;
      border-radius: 8px;
      font-size: 11px;
      font-weight: 600;
      background: rgba(255,255,255,0.1);
      color: #888;
      border: 1px solid #333 !important;
    }
    .lang-btn.active {
      background: rgba(0,255,136,0.2);
      color: #00ff88;
      border-color: #00ff88 !important;
    }
    
    /* 타이틀 */
    .title-icon { font-size: 70px; font-weight: 900; background: linear-gradient(135deg, #00ff88, #00ccff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .title-text { font-size: 32px; font-weight: 700; margin: 10px 0; text-align: center; }
    
    /* 정답/오답 애니메이션 */
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      10%, 30%, 50%, 70%, 90% { transform: translateX(-8px); }
      20%, 40%, 60%, 80% { transform: translateX(8px); }
    }
    @keyframes bounce {
      0% { transform: scale(1); }
      30% { transform: scale(1.3); }
      50% { transform: scale(0.9); }
      70% { transform: scale(1.1); }
      100% { transform: scale(1); }
    }
    @keyframes correctPulse {
      0% { box-shadow: 0 0 0 0 rgba(0, 255, 136, 0.7); }
      70% { box-shadow: 0 0 0 20px rgba(0, 255, 136, 0); }
      100% { box-shadow: 0 0 0 0 rgba(0, 255, 136, 0); }
    }
    .shake { animation: shake 0.5s ease-in-out; }
    .bounce { animation: bounce 0.4s ease-out; }
    .correct-pulse { animation: correctPulse 0.6s ease-out; }
    .title-sub { color: #888; margin-bottom: 30px; }
    .best-record { color: #ffd700; font-size: 14px; margin-bottom: 30px; }
    .btn-start { background: linear-gradient(135deg, #00ff88, #00cc66); padding: 16px 48px; border-radius: 50px; font-size: 18px; font-weight: 700; color: #000; margin-bottom: 15px; box-shadow: 0 0 30px rgba(0,255,136,0.4); }
    .btn-practice { background: linear-gradient(135deg, #10b981, #34d399); padding: 14px 40px; border-radius: 50px; font-size: 16px; font-weight: 700; color: #fff; margin-bottom: 15px; box-shadow: 0 0 20px rgba(16,185,129,0.4); }
    .btn-quit { background: rgba(239,68,68,0.2); border: 2px solid #ef4444 !important; padding: 10px 24px; border-radius: 50px; font-size: 14px; color: #ef4444; margin-top: 20px; }
    .btn-how { background: transparent; border: 2px solid #555 !important; padding: 10px 20px; border-radius: 50px; font-size: 13px; color: #888; }
    .btn-rank { background: linear-gradient(135deg, #f59e0b, #fbbf24); padding: 14px 40px; border-radius: 50px; font-size: 16px; font-weight: 700; color: #fff; margin-bottom: 15px; box-shadow: 0 0 20px rgba(245,158,11,0.4); }
    .bottom-buttons { display: flex; gap: 10px; justify-content: center; margin-top: 10px; }
    
    /* 게임 방법 모달 */
    .modal-overlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.9);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      padding: 20px;
    }
    .modal-content {
      background: linear-gradient(135deg, #1a1a3a, #0a0a1a);
      border-radius: 20px;
      padding: 30px;
      max-width: 350px;
      border: 1px solid #333;
      max-height: 80vh;
      overflow-y: auto;
    }
    .modal-title { font-size: 24px; font-weight: 700; margin-bottom: 20px; text-align: center; }
    .modal-text { color: #aaa; font-size: 14px; line-height: 1.8; margin-bottom: 15px; }
    .modal-text strong { color: #00ff88; }
    .modal-text .gold { color: #ffd700; }
    .modal-close { background: linear-gradient(135deg, #00ff88, #00cc66); padding: 12px 40px; border-radius: 50px; font-size: 16px; font-weight: 700; color: #000; margin-top: 20px; width: 100%; }
    
    /* 이름 입력 */
    .name-label { margin-bottom: 30px; font-size: 20px; }
    .name-input { background: rgba(255,255,255,0.1); border: 2px solid #333; border-radius: 12px; padding: 16px 24px; font-size: 18px; color: #fff; text-align: center; width: 250px; outline: none; }
    .btn-go { background: linear-gradient(135deg, #00ff88, #00cc66); padding: 14px 40px; border-radius: 50px; font-size: 16px; font-weight: 700; color: #000; margin-top: 30px; }
    .btn-go:disabled { background: #333; color: #666; }
    .btn-home { background: transparent; border: 2px solid #444 !important; padding: 12px 32px; border-radius: 50px; font-size: 14px; color: #888; margin-top: 15px; }
    
    /* 라운드 전환 화면 */
    .round-screen {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: linear-gradient(135deg, #071a12, #0d2818);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 999;
    }
    .round-number {
      font-size: 80px;
      font-weight: 900;
      background: linear-gradient(135deg, #00ff88, #00ccff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: roundPop 0.5s ease-out;
    }
    .round-text { font-size: 28px; margin-top: 10px; color: #fff; }
    .round-sub { font-size: 16px; color: #888; margin-top: 15px; }
    @keyframes roundPop {
      0% { transform: scale(0.5); opacity: 0; }
      50% { transform: scale(1.2); }
      100% { transform: scale(1); opacity: 1; }
    }
    
    /* 게임 */
    .game-area { width: 100%; max-width: 400px; text-align: center; }
    .player-display { font-size: 16px; font-weight: 600; color: #00ff88; margin-bottom: 10px; }
    .game-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; font-size: 14px; color: #888; }
    .round-info { font-size: 12px; color: #00ff88; margin-bottom: 10px; opacity: 0.8; }
    
    /* 점수판 */
    .score-container {
      position: relative;
      padding: 8px 20px;
      background: linear-gradient(135deg, rgba(255,204,0,0.2), rgba(255,150,0,0.1));
      border-radius: 20px;
      border: 2px solid rgba(255,204,0,0.5);
      box-shadow: 0 0 20px rgba(255,204,0,0.3);
    }
    .score-container.bonus-active {
      animation: scoreGlow 0.5s ease-out;
      border-color: #ffd700;
      box-shadow: 0 0 30px rgba(255,215,0,0.6), 0 0 60px rgba(255,150,0,0.3);
    }
    @keyframes scoreGlow { 0% { transform: scale(1); } 30% { transform: scale(1.2); } 100% { transform: scale(1); } }
    .score-text {
      font-size: 28px;
      font-weight: 800;
      background: linear-gradient(135deg, #ffd700, #ffaa00);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .score-text.animating { animation: scorePop 0.4s ease-out; }
    @keyframes scorePop { 0% { transform: scale(1); } 50% { transform: scale(1.3); } 100% { transform: scale(1); } }
    
    .game-header .hl-green { color: #00ff88; font-weight: 700; }
    .game-header .hl-blue { color: #00ccff; font-weight: 700; }
    
    /* 타이머 바 */
    .timer-labels { display: flex; justify-content: space-between; margin-bottom: 5px; font-size: 10px; }
    .timer-label { padding: 2px 8px; border-radius: 10px; font-weight: 600; }
    .timer-label.gold { background: rgba(255,215,0,0.3); color: #ffd700; }
    .timer-label.green { background: rgba(0,255,136,0.2); color: #00ff88; }
    .timer-label.red { background: rgba(255,100,100,0.2); color: #ff6b6b; }
    
    .timer-bar { width: 100%; height: 12px; background: #222; border-radius: 6px; margin-bottom: 20px; overflow: hidden; box-shadow: inset 0 2px 4px rgba(0,0,0,0.5); }
    .timer-fill { height: 100%; border-radius: 6px; transition: background 0.3s; }
    .timer-fill.bonus10 { background: linear-gradient(90deg, #ffd700, #ffaa00, #ffd700); box-shadow: 0 0 15px #ffd700; animation: timerPulse10 0.3s infinite alternate; }
    .timer-fill.bonus5 { background: linear-gradient(90deg, #00ff88, #00cc66, #00ff88); box-shadow: 0 0 10px #00ff88; }
    .timer-fill.nobonus { background: linear-gradient(90deg, #ff6b6b, #ff4444); }
    @keyframes timerPulse10 { from { filter: brightness(1); } to { filter: brightness(1.3); } }
    
    .question-box { background: rgba(255,255,255,0.05); border-radius: 20px; padding: 30px; margin-bottom: 25px; position: relative; overflow: hidden; }
    
    /* 보너스 텍스트 */
    .bonus-float {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
      font-size: 60px; font-weight: 900; pointer-events: none; z-index: 100; opacity: 0;
    }
    .bonus-float.bonus10 { background: linear-gradient(135deg, #ffd700, #ff8c00); -webkit-background-clip: text; -webkit-text-fill-color: transparent; filter: drop-shadow(0 0 10px #ffd700); }
    .bonus-float.bonus5 { background: linear-gradient(135deg, #00ff88, #00cc66); -webkit-background-clip: text; -webkit-text-fill-color: transparent; filter: drop-shadow(0 0 10px #00ff88); }
    .bonus-float.bonus0 { background: linear-gradient(135deg, #ffffff, #aaaaaa); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-size: 40px; }
    .bonus-float.animate { animation: bonusFloat 1s ease-out forwards; }
    @keyframes bonusFloat {
      0% { opacity: 0; transform: translate(-50%, -50%) scale(0.5); }
      20% { opacity: 1; transform: translate(-50%, -50%) scale(1.2); }
      100% { opacity: 0; transform: translate(-50%, -150%) scale(0.8); }
    }
    
    /* 파티클 */
    .particles { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; overflow: hidden; }
    .particle { position: absolute; width: 10px; height: 10px; border-radius: 50%; animation: particleFly 1s ease-out forwards; }
    @keyframes particleFly { 0% { opacity: 1; transform: translate(0, 0) scale(1); } 100% { opacity: 0; transform: translate(var(--tx), var(--ty)) scale(0); } }
    
    .q-value { font-size: 50px; font-weight: 800; }
    .q-sub { font-size: 32px; font-weight: 600; color: #ff6b6b; }
    .q-mark { font-size: 28px; margin-top: 15px; color: #555; }
    .options { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
    .opt-btn { background: rgba(255,255,255,0.1); border: 2px solid #333 !important; border-radius: 16px; padding: 20px; font-size: 26px; font-weight: 700; color: #fff; transition: transform 0.1s; }
    .opt-btn:active { transform: scale(0.95); }
    .opt-btn.correct { background: rgba(0,255,136,0.3); border-color: #00ff88 !important; box-shadow: 0 0 20px rgba(0,255,136,0.5); }
    .opt-btn.wrong { background: rgba(255,68,68,0.3); border-color: #ff4444 !important; }
    
    /* 결과 */
    .result-emoji { font-size: 60px; margin-bottom: 20px; }
    .result-title { font-size: 28px; font-weight: 700; margin-bottom: 10px; }
    .result-title.win { background: linear-gradient(135deg, #00ff88, #00ccff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .result-title.lose { color: #ff6b6b; }
    .result-score { font-size: 48px; font-weight: 800; color: #ffd700; margin: 10px 0; }
    .result-best { font-size: 14px; color: #00ff88; margin-bottom: 10px; }
    .result-stats { font-size: 13px; color: #888; margin-bottom: 20px; }
    .result-msg { color: #00ff88; margin-bottom: 20px; font-size: 18px; }
    .btn-retry { background: linear-gradient(135deg, #00ff88, #00cc66); padding: 14px 40px; border-radius: 50px; font-size: 16px; font-weight: 700; color: #000; margin-right: 10px; }
    .btn-board { background: transparent; border: 2px solid #ffcc00 !important; padding: 14px 40px; border-radius: 50px; font-size: 16px; color: #ffcc00; }
    
    /* 리더보드 */
    .board-list { background: rgba(255,255,255,0.05); border-radius: 16px; overflow: hidden; width: 100%; max-width: 400px; }
    .board-item { display: flex; justify-content: space-between; padding: 16px 20px; border-bottom: 1px solid #222; }
    .board-item:last-child { border-bottom: none; }
    .board-rank { width: 30px; font-size: 20px; }
    .board-name { font-weight: 600; }
    .board-score { color: #ffcc00; font-weight: 700; }
    .btn-back { background: transparent; border: 2px solid #444 !important; padding: 14px 40px; border-radius: 50px; font-size: 16px; color: #888; margin-top: 30px; }

    /* 광고 팝업 */
    .ad-popup-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.95); display: flex; align-items: center; justify-content: center; z-index: 2000; padding: 20px; }
    .ad-popup { background: linear-gradient(135deg, #0d2818, #071a12); border-radius: 24px; padding: 35px 30px; max-width: 340px; width: 100%; border: 2px solid #00ff88; text-align: center; box-shadow: 0 0 40px rgba(0,255,136,0.3); }
    .ad-popup-icon { font-size: 60px; margin-bottom: 15px; }
    .ad-popup-title { font-size: 22px; font-weight: 700; color: #fff; margin-bottom: 10px; }
    .ad-popup-msg { font-size: 14px; color: #00ff88; margin-bottom: 25px; line-height: 1.6; }
    .ad-popup-count { font-size: 13px; color: #666; margin-bottom: 20px; }
    .btn-watch-ad { background: linear-gradient(135deg, #10b981, #34d399); padding: 16px 40px; border-radius: 50px; font-size: 16px; font-weight: 700; color: #fff; width: 100%; margin-bottom: 12px; box-shadow: 0 0 20px rgba(16,185,129,0.4); }
    .btn-remove-ads { background: linear-gradient(135deg, #f59e0b, #fbbf24); padding: 14px 40px; border-radius: 50px; font-size: 14px; font-weight: 700; color: #fff; width: 100%; box-shadow: 0 0 20px rgba(245,158,11,0.3); }
    .ad-free-badge { display: inline-block; background: linear-gradient(135deg, #10b981, #34d399); padding: 4px 12px; border-radius: 20px; font-size: 11px; font-weight: 600; color: #fff; margin-left: 8px; }

    /* 목표 설정 */
    .btn-goal { background: transparent; border: 2px solid #555 !important; padding: 10px 20px; border-radius: 50px; font-size: 13px; color: #888; }
    .goal-display { background: rgba(255,215,0,0.1); border: 1px solid rgba(255,215,0,0.3); border-radius: 12px; padding: 12px 20px; margin-bottom: 20px; max-width: 280px; }
    .goal-target { color: #ffd700; font-weight: 600; font-size: 14px; }
    .goal-reward { color: #00ff88; font-size: 12px; margin-top: 5px; }
    
    .goal-form { text-align: left; }
    .goal-label { display: block; color: #888; font-size: 12px; margin-bottom: 5px; margin-top: 15px; }
    .goal-input { width: 100%; background: rgba(255,255,255,0.1); border: 1px solid #444; border-radius: 8px; padding: 10px 12px; font-size: 14px; color: #fff; outline: none; }
    .goal-input:focus { border-color: #00ff88; }
    .goal-select { width: 100%; background: rgba(255,255,255,0.1); border: 1px solid #444; border-radius: 8px; padding: 10px 12px; font-size: 14px; color: #fff; outline: none; }
    .goal-row { display: flex; gap: 10px; }
    .goal-row > div { flex: 1; }
    .goal-buttons { display: flex; gap: 10px; margin-top: 20px; }
    .goal-buttons button { flex: 1; padding: 12px; border-radius: 25px; font-size: 14px; font-weight: 600; }
    .btn-save-goal { background: linear-gradient(135deg, #00ff88, #00cc66); color: #000; }
    .btn-delete-goal { background: rgba(255,68,68,0.2); color: #ff6b6b; border: 1px solid #ff6b6b !important; }
    
    /* 목표 달성 결과 */
    .goal-result { margin: 15px 0; padding: 15px; border-radius: 12px; }
    .goal-achieved { background: linear-gradient(135deg, rgba(0,255,136,0.2), rgba(255,215,0,0.2)); border: 2px solid #ffd700; animation: goalPulse 1s infinite alternate; }
    .goal-failed { background: rgba(255,255,255,0.05); border: 1px solid #444; }
    .goal-result-title { font-size: 18px; font-weight: 700; margin-bottom: 5px; }
    .goal-result-name { font-size: 22px; font-weight: 800; color: #00ff88; margin: 8px 0; }
    .goal-result-reward { color: #ffd700; font-size: 20px; font-weight: 700; margin: 10px 0; }
    .goal-result-sub { color: #888; font-size: 13px; }
    .btn-share { background: linear-gradient(135deg, #10b981, #34d399); padding: 12px 24px; border-radius: 50px; font-size: 14px; font-weight: 600; color: #fff; margin-top: 15px; border: none; cursor: pointer; box-shadow: 0 0 15px rgba(16,185,129,0.4); }
    @keyframes goalPulse { from { box-shadow: 0 0 20px rgba(255,215,0,0.3); } to { box-shadow: 0 0 40px rgba(255,215,0,0.5); } }
    
      margin-top: 20px; padding: 12px 30px; border-radius: 25px;
      background: linear-gradient(135deg, #00ff88, #00cc66);
      color: #000; font-weight: 700; border: none; font-size: 14px;
    }
  
    /* 버튼 내 아이콘 크기 조절 */
    .btn-goal img, .btn-rank img, .btn-home img, .btn-share img, .btn-watch-ad img, .btn-remove-ads img { width: 24px; height: 24px; vertical-align: -5px; }
    .best-record img, .goal-display img { width: 22px; height: 22px; vertical-align: -4px; }
    .goal-result img { width: 26px; height: 26px; vertical-align: -5px; }
    .result-best img { width: 28px; height: 28px; vertical-align: -6px; }
  
    

  
    

  
    

  
    /* 버튼 아이콘 절대 위치로 텍스트 센터 유지 */
    .btn-home, .btn-share, .btn-rank, .btn-board {
      position: relative !important;
      padding-left: 40px !important;
      padding-right: 40px !important;
    }
    .btn-home img, .btn-share img, .btn-rank img, .btn-board img {
      position: absolute !important;
      left: 15px !important;
      top: 50% !important;
      transform: translateY(-50%) !important;
      width: 20px !important;
      height: 20px !important;
    }
    /* 결과 화면 이모지 크기 복원 */
    .result-emoji img { width: 100px !important; height: 100px !important; }

  
    /* 커스텀 아이콘 */

// ===== 진동 (Capacitor Haptics) =====
async function vibrate() {
  try {
    if (window.Capacitor && window.Capacitor.Plugins && window.Capacitor.Plugins.Haptics) {
      await window.Capacitor.Plugins.Haptics.vibrate({ duration: 100 });
    } else if (navigator.vibrate) {
      navigator.vibrate(100);
    }
  } catch (e) { /* 진동 미지원 */ }
}

let currentLang = 'ko';
try {
  const saved = localStorage.getItem('subtraction-lang');
  if (saved) currentLang = saved;
} catch(e) {}

function setLang(lang) {
  currentLang = lang;
  try { localStorage.setItem('subtraction-lang', lang); } catch(e) {}
  
  const langNames = { ko: '한국어', en: 'EN', zh: '中文', es: 'ES', pt: 'PT', ru: 'RU', fr: 'FR', de: 'DE', ja: '日本語', vi: 'VI', tr: 'TR', th: 'TH', id: 'ID' };
  document.querySelectorAll('.lang-btn').forEach(btn => {
    btn.classList.toggle('active', btn.textContent === langNames[lang]);
  });
  
  const L = LANG[lang];
  document.getElementById('titleText').textContent = L.title;
  document.getElementById('titleSub').textContent = L.subtitle;
  document.getElementById('bestLabel').textContent = L.bestRecord;
  document.getElementById('bestPts').textContent = L.pts;
  document.getElementById('btnStart').textContent = L.start;
  document.getElementById('btnPractice').textContent = L.practice;
  document.getElementById('btnQuit').textContent = L.quit;
  document.getElementById('btnHow').textContent = L.howTo;
  document.getElementById('btnGoal').innerHTML = L.goal;
  document.getElementById('btnRankTitle').innerHTML = '<img src="icon-record.png" class="icon"> ' + L.ranking;
  document.getElementById('nameLabel').textContent = L.enterName;
  document.getElementById('nameInput').placeholder = L.namePlaceholder;
  document.getElementById('btnGo').textContent = L.go;
  document.getElementById('roundLabel').textContent = L.round;
  document.getElementById('questionLabel').textContent = L.question;
  document.getElementById('scorePts').textContent = L.pts;
  document.getElementById('btnRetry').textContent = L.retry;
  document.getElementById('btnRankResult').innerHTML = '<img src="icon-record.png" class="icon"> ' + L.ranking;
  document.getElementById('boardTitle').innerHTML = '<img src="icon-record.png" class="icon"> ' + L.ranking;
  document.getElementById('btnBack').textContent = L.back;
  document.getElementById('modalTitle').innerHTML = L.modalTitle;
  document.getElementById('modalText').innerHTML = L.modalText;
  document.getElementById('modalClose').textContent = L.modalClose;
  
  // 목표 모달
  document.getElementById('goalModalTitle').innerHTML = L.goalTitle;
  document.getElementById('goalTypeLabel').textContent = L.goalType;
  document.getElementById('optScore').textContent = L.goalScore;
  document.getElementById('optBeat').textContent = L.goalBeat;
  document.getElementById('targetScoreLabel').textContent = L.targetScore;
  document.getElementById('targetNameLabel').textContent = L.targetName;
  document.getElementById('targetName').placeholder = L.targetNamePh;
  document.getElementById('theirScoreLabel').textContent = L.theirScore;
  document.getElementById('rewardLabel').innerHTML = L.reward;
  document.getElementById('rewardInput').placeholder = L.rewardPh;
  document.getElementById('btnSaveGoal').textContent = L.saveGoal;
  document.getElementById('btnDeleteGoal').textContent = L.deleteGoal;
  
  
  // 홈 버튼
  document.getElementById('btnHomeName').innerHTML = L.home;
  document.getElementById('btnHomeResult').innerHTML = L.home;
  
  updateGoalDisplay();
}

let audioCtx = null;

function initAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
}

function playTone(freq, duration, type = 'triangle') {
  if (!audioCtx) return;
  try {
    if (audioCtx.state === 'suspended') audioCtx.resume();
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = type;
    osc.frequency.value = freq;
    gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start(audioCtx.currentTime);
    osc.stop(audioCtx.currentTime + duration);
  } catch(e) {}
}

function playTick(percent) {
  if (percent > 80) playTone(600, 0.05);
  else if (percent > 60) playTone(800, 0.06);
  else if (percent > 30) playTone(900, 0.07);
  else playTone(1000, 0.08);
}

function playCorrect() {
  playTone(523, 0.1, 'sine');
  setTimeout(() => playTone(659, 0.1, 'sine'), 80);
  setTimeout(() => playTone(784, 0.15, 'sine'), 160);
}

function playWrong() {
  playTone(200, 0.2, 'sawtooth');
  setTimeout(() => playTone(150, 0.3, 'sawtooth'), 150);
}

function playRoundStart() {
  playTone(440, 0.15, 'sine');
  setTimeout(() => playTone(550, 0.15, 'sine'), 150);
  setTimeout(() => playTone(660, 0.2, 'sine'), 300);
}

const ROUND_CONFIG = {
  1: { minSub: 3, maxSub: 9, startValue: 100 },
  2: { minSub: 11, maxSub: 19, startValue: 100 },
  3: { minSub: 21, maxSub: 29, startValue: 200 }
};

function showGoalModal() {
  const L = LANG[currentLang];
  if (goalData) {
    document.getElementById('goalType').value = goalData.type;
    if (goalData.type === 'beat') {
      document.getElementById('targetName').value = goalData.targetName || '';
      document.getElementById('theirScore').value = goalData.targetScore || '';
      document.getElementById('targetScore').value = goalData.targetScore || '';
    }
    document.getElementById('rewardInput').value = goalData.reward || '';
    document.getElementById('goalType').value = 'score';
    document.getElementById('targetScore').value = '';
    document.getElementById('targetName').value = '';
    document.getElementById('theirScore').value = '';
    document.getElementById('rewardInput').value = '';
  }
  toggleGoalType();
  document.getElementById('modal-goal').classList.remove('hidden');
}

function closeGoalModal() {
  document.getElementById('modal-goal').classList.add('hidden');
}

function toggleGoalType() {
  const type = document.getElementById('goalType').value;
  document.getElementById('scoreFields').classList.toggle('hidden', type === 'beat');
  document.getElementById('beatFields').classList.toggle('hidden', type === 'score');
}

function saveGoal() {
  const type = document.getElementById('goalType').value;
  const reward = document.getElementById('rewardInput').value.trim();
  
  let targetScore, targetName;
  if (type === 'beat') {
    targetName = document.getElementById('targetName').value.trim();
    targetScore = parseInt(document.getElementById('theirScore').value) || 0;
    if (!targetName || targetScore <= 0) return;
  } else {
    targetScore = parseInt(document.getElementById('targetScore').value) || 0;
    if (targetScore <= 0) return;
  }
  
  goalData = { type, targetScore, targetName, reward };
  try { localStorage.setItem('subtraction-goal', JSON.stringify(goalData)); } catch(e) {}
  
  updateGoalDisplay();
  closeGoalModal();
}

function deleteGoal() {
  goalData = null;
  try { localStorage.removeItem('subtraction-goal'); } catch(e) {}
  updateGoalDisplay();
  closeGoalModal();
}

function updateGoalDisplay() {
  const L = LANG[currentLang];
  const display = document.getElementById('goalDisplay');

  if (goalData && goalData.targetScore > 0) {
    display.classList.remove('hidden');

    let targetText;
    if (goalData.type === 'beat') {
      targetText = L.beatGoal.replace('{name}', goalData.targetName).replace('{score}', goalData.targetScore);
    } else {
      targetText = L.scoreGoal.replace('{score}', goalData.targetScore);
    }
    document.getElementById('goalTarget').innerHTML = L.currentGoal + ': ' + targetText;

    if (goalData.reward) {
      document.getElementById('goalReward').innerHTML = L.rewardLabel.replace('{reward}', goalData.reward);
      document.getElementById('goalReward').classList.remove('hidden');
    } else {
      document.getElementById('goalReward').classList.add('hidden');
    }
  } else {
    display.classList.add('hidden');
  }
}

function checkGoalAchievement(finalScore) {
  if (!goalData || goalData.targetScore <= 0) return null;
  return finalScore > goalData.targetScore;
}

function playGoalSound() {
  if (!audioCtx) return;
  const now = audioCtx.currentTime;
  
  // 팡파레 효과
  [523.25, 659.25, 783.99, 1046.50].forEach((freq, i) => {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.frequency.value = freq;
    osc.type = 'triangle';
    gain.gain.setValueAtTime(0.3, now + i * 0.15);
    gain.gain.exponentialDecayTo && gain.gain.exponentialDecayTo(0.01, now + i * 0.15 + 0.5);
    gain.gain.setValueAtTime(0.3, now + i * 0.15);
    gain.gain.linearRampToValueAtTime(0.01, now + i * 0.15 + 0.4);
    osc.start(now + i * 0.15);
    osc.stop(now + i * 0.15 + 0.5);
  });
}

function getNewSubtractNum() {
  const config = ROUND_CONFIG[round];
  const range = config.maxSub - config.minSub + 1;
  let newNum;
  do { newNum = Math.floor(Math.random() * range) + config.minSub; } while (usedSubNums.includes(newNum));
  usedSubNums.push(newNum);
  return newNum;
}

function makeOptions(correct) {
  const opts = new Set([correct]);
  opts.add(Math.random() > 0.5 ? correct + 1 : correct - 1);
  opts.add(correct - 10);
  opts.add(Math.random() > 0.5 ? correct + 11 : correct - 11);
  const arr = Array.from(opts);
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function updateTimer() {
  if (!gameRunning) return;
  
  const elapsed = Date.now() - timerStart;
  const remaining = Math.max(0, timerDuration - elapsed);
  const percent = (remaining / timerDuration) * 100;
  
  const tickLevel = Math.floor(percent / 10) * 10;
  if (tickLevel < lastTickPercent && tickLevel >= 0) {
    lastTickPercent = tickLevel;
    playTick(percent);
  }
  
  const fill = document.getElementById('timerFill');
  fill.style.width = percent + '%';
  
  if (percent > 80) fill.className = 'timer-fill bonus10';
  else if (percent > 60) fill.className = 'timer-fill bonus5';
  else fill.className = 'timer-fill nobonus';
  
  if (remaining <= 0) {
    gameRunning = false;
    playWrong();
    vibrate();
    if (isPracticeMode) {
      practiceWrong++;
      setTimeout(nextQuestion, 600);
    } else {
      endGame(false);
    }
    return;
  }
  
  rafId = requestAnimationFrame(updateTimer);
}

function startTimer() {
  timerStart = Date.now();
  lastTickPercent = 100;
  gameRunning = true;
  if (rafId) cancelAnimationFrame(rafId);
  rafId = requestAnimationFrame(updateTimer);
}

function stopTimer() {
  gameRunning = false;
  if (rafId) { cancelAnimationFrame(rafId); rafId = null; }
}

    p.style.left = '50%';

    p.style.setProperty('--tx', (Math.random() - 0.5) * 200 + 'px');
    p.style.setProperty('--ty', (Math.random() - 0.5) * 200 + 'px');
    container.appendChild(p);
  }
}

function showScoreAnimation(totalPoints, hasBonus) {
  const bonusFloat = document.getElementById('bonusFloat');
  bonusFloat.textContent = '+' + totalPoints;
  
  let colorClass = totalPoints >= 20 ? 'bonus10' : totalPoints >= 15 ? 'bonus5' : 'bonus0';
  if (totalPoints >= 15) createParticles(totalPoints >= 20);
  
  bonusFloat.className = 'bonus-float ' + colorClass + ' animate';
  
  if (hasBonus) {
    const sc = document.getElementById('scoreContainer');
    sc.classList.add('bonus-active');
    document.getElementById('scoreNum').classList.add('animating');
    setTimeout(() => {
      sc.classList.remove('bonus-active');
      document.getElementById('scoreNum').classList.remove('animating');
    }, 1000);
  }
  
  setTimeout(() => { bonusFloat.className = 'bonus-float'; }, 1000);
}

  const L = LANG[currentLang];
  
  document.getElementById('roundNum').textContent = round;
  document.getElementById('questionNum').textContent = question;

  document.getElementById('subVal').textContent = subtractNum;

}

// 연습모드 저장용 변수
let savedRound = 1;
let savedQuestion = 1;
let savedCurrentValue = 100;

function startPractice() {
  initAudio();
  isPracticeMode = true;
  playerName = '연습';
  round = 1; question = 1; score = 0;
  currentValue = ROUND_CONFIG[1].startValue;
  usedSubNums = []; totalCorrect = 0; totalQuestions = 0;
  practiceCorrect = 0; practiceWrong = 0;
  subtractNum = getNewSubtractNum();
  savedRound = 1; savedQuestion = 1;
  savedCurrentValue = currentValue;

  document.getElementById('scoreContainer').classList.add('hidden');
  document.getElementById('btnQuit').classList.remove('hidden');

  updateRoundBackground(1);
  showScreen('game');
  showRoundScreen(1, subtractNum, showQuestion);
}

function resumePractice() {
  // 멈춘 시점에서 계속
  round = savedRound;
  question = savedQuestion;
  currentValue = savedCurrentValue;

  document.getElementById('scoreContainer').classList.add('hidden');
  document.getElementById('btnQuit').classList.remove('hidden');

  updateRoundBackground(round);
  showScreen('game');
  showQuestion();
}

function startGame() {
  playerName = document.getElementById('nameInput').value.trim();
  if (!playerName) return;

  initAudio();
  round = 1; question = 1; score = 0;
  currentValue = ROUND_CONFIG[1].startValue;
  usedSubNums = []; totalCorrect = 0; totalQuestions = 0;
  practiceCorrect = 0; practiceWrong = 0;
  goalCelebrated = false;
  subtractNum = getNewSubtractNum();

  // 플레이어 이름 표시
  document.getElementById('playerDisplay').innerHTML = '<img src="icon-game.png" class="icon"> ' + playerName;

  // 연습모드에서는 점수판 숨김, 그만두기 버튼 표시
  if (isPracticeMode) {
    document.getElementById('scoreContainer').classList.add('hidden');
    document.getElementById('btnQuit').classList.remove('hidden');
  } else {
    document.getElementById('scoreContainer').classList.remove('hidden');
    document.getElementById('btnQuit').classList.add('hidden');
  }

  updateRoundBackground(1);
  showScreen('game');
  showRoundScreen(1, subtractNum, showQuestion);
}

function restartGame() {
  round = 1; question = 1; score = 0;
  currentValue = ROUND_CONFIG[1].startValue;
  usedSubNums = []; totalCorrect = 0; totalQuestions = 0;
  practiceCorrect = 0; practiceWrong = 0;
  goalCelebrated = false;
  subtractNum = getNewSubtractNum();

  // 연습모드에서는 점수판 숨김, 그만두기 버튼 표시
  if (isPracticeMode) {
    document.getElementById('scoreContainer').classList.add('hidden');
    document.getElementById('btnQuit').classList.remove('hidden');
  } else {
    document.getElementById('scoreContainer').classList.remove('hidden');
    document.getElementById('btnQuit').classList.add('hidden');
  }

  updateRoundBackground(1);
  showScreen('game');
  showRoundScreen(1, subtractNum, showQuestion);
}

function selectAnswer(idx) {
  if (answered || !gameRunning) return;
  answered = true;
  stopTimer();
  totalQuestions++;
  
  const selected = options[idx];
  const elapsed = Date.now() - timerStart;
  
  for (let i = 0; i < 4; i++) {
    const btn = document.getElementById('opt' + i);
    btn.disabled = true;
    if (options[i] === correctAnswer) btn.classList.add('correct');
    else if (i === idx) btn.classList.add('wrong');
  }
  
  if (selected === correctAnswer) {
    playCorrect();
    totalCorrect++;
    if (isPracticeMode) {
      practiceCorrect++;
    }

    // 정답 애니메이션
    const correctBtn = document.getElementById('opt' + idx);
    correctBtn.classList.add('bounce', 'correct-pulse');
    if (!isPracticeMode) {
      document.getElementById('scoreContainer').classList.add('bounce');
    }
    setTimeout(() => {
      correctBtn.classList.remove('bounce', 'correct-pulse');
      if (!isPracticeMode) {
        document.getElementById('scoreContainer').classList.remove('bounce');
      }
    }, 600);

    if (!isPracticeMode) {
      let points = 10;
      if (elapsed <= 2000) points = 20;
      else if (elapsed <= 4000) points = 15;

      score += points;

      // 목표 달성 체크
      checkAndCelebrateGoal(score);

      showScoreAnimation(points, points >= 15);

      setTimeout(() => { document.getElementById('scoreNum').textContent = score; }, 200);
    }
    setTimeout(nextQuestion, 500);
  } else {
    playWrong();
    vibrate();
    wrongAnswerIdx = idx;
    wrongAnswerSelected = selected;
    if (isPracticeMode) {
      practiceWrong++;
    }

    // 오답 애니메이션 - 화면 흔들림
    document.getElementById('screen-game').classList.add('shake');
    setTimeout(() => {
      document.getElementById('screen-game').classList.remove('shake');
    }, 500);

    if (isPracticeMode) {
      setTimeout(nextQuestion, 600);
    } else {
      setTimeout(() => endGame(false), 600);
    }
  }
}

function nextQuestion() {
  currentValue = currentValue - subtractNum;
  question++;
  
  if (question > 10) {
    round++;
    if (round > 3) { endGame(true); return; }
    question = 1;
    currentValue = ROUND_CONFIG[round].startValue;
    usedSubNums = [];
    subtractNum = getNewSubtractNum();
    updateRoundBackground(round);
    showRoundScreen(round, subtractNum, showQuestion);
    return;
  }
  
  showQuestion();
}

function quitPractice() {
  stopTimer();
  // 현재 위치 저장
  savedRound = round;
  savedQuestion = question;
  savedCurrentValue = currentValue;
  endGame(false);
}

function endGame(won) {
  stopTimer();
  const L = LANG[currentLang];

  if (isPracticeMode) {
    // 연습 모드 결과 화면
    document.getElementById('resultEmoji').textContent = '📝';
    document.getElementById('resultTitle').textContent = L.practiceResult;
    document.getElementById('resultTitle').className = 'result-title win';
    document.getElementById('resultName').textContent = '';
    document.getElementById('resultNameSuffix').textContent = '';
    document.getElementById('resultScore').textContent = '';
    document.getElementById('resultBest').classList.add('hidden');
    document.getElementById('resultStats').classList.remove('hidden');
    document.getElementById('resultStats').textContent = L.practiceCorrect + ': ' + practiceCorrect + ' | ' + L.practiceWrong + ': ' + practiceWrong;
    document.getElementById('goalResult').classList.add('hidden');
    document.getElementById('resultMsg').textContent = '';
    // 랭킹 버튼 숨김, 다시하기를 계속하기로 변경
    document.getElementById('btnRankResult').classList.add('hidden');
    document.getElementById('btnRetry').textContent = L.continue || '계속하기';
    document.getElementById('btnRetry').onclick = resumePractice;
    showScreen('result');
    return;
  }

  // 일반 모드: 랭킹 버튼 표시, 다시하기 버튼 복원
  document.getElementById('btnRankResult').classList.remove('hidden');
  document.getElementById('btnRetry').textContent = L.retry;
  document.getElementById('btnRetry').onclick = restartGame;

  let isNewBest = false;
  if (score > bestScore) {
    bestScore = score;
    isNewBest = true;
    try { localStorage.setItem('subtraction-best', bestScore.toString()); } catch(e) {}
  }

  if (score > 0) {
    leaderboard.push({ name: playerName, score: score, date: new Date().toLocaleDateString() });
    leaderboard.sort((a, b) => b.score - a.score);
    leaderboard = leaderboard.slice(0, 10);
    try { localStorage.setItem('subtraction-leaderboard', JSON.stringify(leaderboard)); } catch(e) {}
    // 홈화면 최고기록 업데이트
    if (leaderboard.length > 0) {
      const best = leaderboard[0];
      document.getElementById('bestRecord').classList.remove('hidden');
      document.getElementById('bestName').textContent = best.name;
      document.getElementById('bestScore').textContent = best.score;
    }
  }

  document.getElementById('resultEmoji').innerHTML = won ? '<img src="icon-victory.png" class="icon">' : '<img src="icon-gameover.png" class="icon">';
  document.getElementById('resultTitle').textContent = won ? L.congrats : L.gameOver;
  document.getElementById('resultTitle').className = 'result-title ' + (won ? 'win' : 'lose');
  document.getElementById('resultName').textContent = playerName;
  document.getElementById('resultNameSuffix').textContent = L.yourScore;
  document.getElementById('resultScore').textContent = score + L.pts;

  if (isNewBest && score > 0) {
    document.getElementById('resultBest').innerHTML = L.newBest;
    document.getElementById('resultBest').classList.remove('hidden');
  } else {
    document.getElementById('resultBest').classList.add('hidden');
  }

  document.getElementById('resultStats').classList.add('hidden');

  // 목표 달성 체크
  const goalResult = document.getElementById('goalResult');
  const goalAchieved = checkGoalAchievement(score);

  if (goalAchieved === true) {
    goalResult.classList.remove('hidden', 'goal-failed');
    goalResult.classList.add('goal-achieved');
    document.getElementById('goalResultTitle').innerHTML = L.goalAchieved;
    document.getElementById('goalResultName').innerHTML = '<img src="icon-record.png" class="icon"> ' + playerName;
    document.getElementById('goalResultReward').innerHTML = '<img src="icon-reward.png" class="icon"> ' + (goalData.reward || '');
    document.getElementById('goalResultReward').classList.toggle('hidden', !goalData.reward);
    document.getElementById('goalResultSub').innerHTML = L.getReward;
    document.getElementById('btnShare').classList.remove('hidden');
    document.getElementById('btnShare').innerHTML = L.share;
  } else if (goalAchieved === false) {
    goalResult.classList.remove('hidden', 'goal-achieved');
    goalResult.classList.add('goal-failed');
    document.getElementById('goalResultTitle').innerHTML = L.goalNotYet;
    document.getElementById('goalResultReward').classList.add('hidden');
    document.getElementById('goalResultSub').innerHTML = L.needed.replace('{score}', goalData.targetScore) + L.pts + ' | ' + L.tryAgain;
    document.getElementById('btnShare').classList.add('hidden');
  } else {
    goalResult.classList.add('hidden');
    document.getElementById('btnShare').classList.add('hidden');
  }

  let msg = '';
  if (won) {
    if (score >= 550) msg = L.msg1;
    else if (score >= 450) msg = L.msg2;
    else if (score >= 350) msg = L.msg3;
    else msg = L.msg4;
  }
  document.getElementById('resultMsg').textContent = msg;

  showScreen('result');
}

function showLeaderboard() {
  const L = LANG[currentLang];
  const list = document.getElementById('boardList');
  if (leaderboard.length === 0) {
    list.innerHTML = '<div style="padding:30px;color:#666;text-align:center">' + L.noRecords + '</div>';
  } else {
    list.innerHTML = leaderboard.map((entry, i) => {
      const rank = i === 0 ? '🥇' : i === 1 ? '🥈' : i === 2 ? '🥉' : (i + 1);
      return `<div class="board-item"><div style="display:flex;align-items:center;gap:12px"><span class="board-rank">${rank}</span><span class="board-name">${entry.name}</span></div><span class="board-score">${entry.score}${L.pts}</span></div>`;
    }).join('');
  }
  showScreen('board');
}

document.addEventListener('visibilitychange', function() {
  if (!document.hidden && gameRunning) {
    const elapsed = Date.now() - timerStart;
    if (elapsed >= timerDuration) {
      stopTimer();
      if (!answered) {
        if (isPracticeMode) {
          playWrong();
    vibrate();
          practiceWrong++;
          setTimeout(nextQuestion, 600);
        } else {
          endGame(false);
        }
      }
    }
  }
});

// ===== 광고 팝업 로직 =====
let adPlayCount = 0;
let isAdFree = false;
const AD_PLAY_LIMIT = 3;

try {
  const savedPlayCount = localStorage.getItem('subtraction-ad-playcount');
  if (savedPlayCount) adPlayCount = parseInt(savedPlayCount, 10) || 0;
  const savedAdFree = localStorage.getItem('subtraction-ad-free');
  if (savedAdFree === 'true') isAdFree = true;
} catch(e) {}

function saveAdData() {
  try {
    localStorage.setItem('subtraction-ad-playcount', adPlayCount.toString());
    localStorage.setItem('subtraction-ad-free', isAdFree.toString());
  } catch(e) {}
}

function updateAdPopupText() {
  const L = LANG[currentLang];
  document.getElementById('adPopupTitle').textContent = L.adPopupTitle;
  document.getElementById('adPopupMsg').innerHTML = L.adPopupMsg;
  document.getElementById('btnWatchAd').innerHTML = L.watchAd;
  document.getElementById('btnRemoveAds').innerHTML = L.removeAds;
}

function showAdPopup() {
  updateAdPopupText();
  document.getElementById('ad-popup').classList.remove('hidden');
}

function hideAdPopup() {
  document.getElementById('ad-popup').classList.add('hidden');
}

function shouldShowAdPopup() {
  if (isAdFree || isPracticeMode) return false;
  return adPlayCount >= AD_PLAY_LIMIT;
}

function incrementPlayCount() {
  if (isAdFree || isPracticeMode) return;
  adPlayCount++;
  saveAdData();
}

function watchAd() {
  adPlayCount = 0;
  saveAdData();
  hideAdPopup();
  restartGame();
}

function removeAds() {
  alert('In-App Purchase will be available after app is published to Google Play.\n\n앱이 Google Play에 출시된 후 인앱 결제가 가능합니다.');
}

const originalRestartGame = restartGame;
restartGame = function() {
  if (shouldShowAdPopup()) {
    showAdPopup();
    return;
  }
  originalRestartGame();
};

const originalStartGame = startGame;
startGame = function() {
  if (shouldShowAdPopup()) {
    showAdPopup();
    return;
  }
  originalStartGame();
};

const originalEndGame = endGame;
endGame = function(won) {
  incrementPlayCount();
  originalEndGame(won);
};
</script>
